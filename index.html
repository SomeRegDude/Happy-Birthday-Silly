<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My silly baby</title>
    <style>
        body {
            background-color: #fff5f5;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .header {
            padding: 40px 20px;
        }
        h1 { color: #ff4d6d; }
        
        /* Navigation Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .tab-btn {
            background-color: #ffb3c1;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn:hover { background-color: #ff4d6d; }
        
        /* Content Sections */
        .content-section {
            background: white;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Happy Birthday to YOUUU Lilou 🎂(choco)</h1>
        <p>I made this simple coding just for you so.. low expectation please :pray: </p>
    </div>

    <div class="tabs">
        <button class="tab-btn">SECETS Letters</button>
        <button class="tab-btn">Photosss</button>
        <button class="tab-btn">Birthday Puzzle!!</button>
    </div>

    <div class="content-section">
        <h3>Select a tab above to unlock your birthday gifts(pls)</h3>
        <p>Take your time exploring each one.(super pls)</p>
    </div>

</body>
</html>
